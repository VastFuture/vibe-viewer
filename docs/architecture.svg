<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 700" width="960" height="700">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="960" height="700" fill="#ffffff"/>
  <text x="480" y="38" fill="#111827" font-size="20" font-weight="600" text-anchor="middle">vibeview 系统架构</text>
  <rect x="40" y="58" width="880" height="240" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="60" y="80" fill="#94a3b8" font-size="12" font-weight="600">BROWSER CLIENT</text>
  <rect x="380" y="90" width="360" height="90" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="560" y="118" fill="#1e40af" font-size="14" font-weight="600" text-anchor="middle">React App</text>
  <text x="560" y="140" fill="#6b7280" font-size="11" text-anchor="middle">App.tsx · Preview.tsx · Sidebar.tsx</text>
  <text x="560" y="156" fill="#6b7280" font-size="11" text-anchor="middle">Themes · Store · WS Client</text>
  <rect x="770" y="90" width="130" height="90" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="835" y="122" fill="#166534" font-size="13" font-weight="600" text-anchor="middle">全屏查看器</text>
  <text x="835" y="140" fill="#6b7280" font-size="10" text-anchor="middle">缩放 · 拖拽 · 主题</text>
  <text x="835" y="155" fill="#6b7280" font-size="10" text-anchor="middle">Blob URL 隔离</text>
  <rect x="60" y="100" width="290" height="70" rx="8" fill="#faf5ff" stroke="#ede9fe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="205" y="128" fill="#7c3aed" font-size="13" font-weight="600" text-anchor="middle">Markdown 渲染管线</text>
  <text x="205" y="148" fill="#6b7280" font-size="11" text-anchor="middle">markdown-it · Shiki · Mermaid 11 · KaTeX</text>
  <rect x="60" y="190" width="290" height="50" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="205" y="212" fill="#1e40af" font-size="12" font-weight="600" text-anchor="middle">Settings (localStorage)</text>
  <text x="205" y="228" fill="#6b7280" font-size="11" text-anchor="middle">主题 · 安全级别 · 软换行 · Emoji · 数学</text>
  <rect x="380" y="200" width="200" height="40" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="480" y="225" fill="#dc2626" font-size="12" font-weight="600" text-anchor="middle">DOMPurify 安全层</text>
  <path d="M 350,135 L 380,135" stroke="#9333ea" stroke-width="1.5" fill="none" marker-end="url(#arrow-purple)"/>
  <path d="M 740,135 L 770,135" stroke="#16a34a" stroke-width="1.5" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M 205,170 L 205,190" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M 350,148 L 380,210" stroke="#dc2626" stroke-width="1.5" fill="none" marker-end="url(#arrow-red)"/>
  <rect x="40" y="320" width="880" height="150" rx="12" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="60" y="342" fill="#c2410c" font-size="12" font-weight="600">EXPRESS SERVER</text>
  <rect x="60" y="355" width="190" height="90" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="155" y="380" fill="#111827" font-size="13" font-weight="600" text-anchor="middle">API 路由</text>
  <text x="155" y="398" fill="#6b7280" font-size="11" text-anchor="middle">GET /api/config</text>
  <text x="155" y="414" fill="#6b7280" font-size="11" text-anchor="middle">GET /api/tree</text>
  <text x="155" y="430" fill="#6b7280" font-size="11" text-anchor="middle">GET /api/file?path=</text>
  <rect x="280" y="355" width="120" height="90" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="340" y="395" fill="#111827" font-size="13" font-weight="600" text-anchor="middle">静态资源</text>
  <text x="340" y="415" fill="#6b7280" font-size="11" text-anchor="middle">/raw?path=</text>
  <rect x="430" y="355" width="180" height="90" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="520" y="380" fill="#111827" font-size="13" font-weight="600" text-anchor="middle">WebSocket</text>
  <text x="520" y="398" fill="#6b7280" font-size="11" text-anchor="middle">file-changed</text>
  <text x="520" y="414" fill="#6b7280" font-size="11" text-anchor="middle">tree-changed</text>
  <text x="520" y="430" fill="#6b7280" font-size="11" text-anchor="middle">自动重连</text>
  <rect x="640" y="355" width="260" height="90" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="770" y="380" fill="#111827" font-size="13" font-weight="600" text-anchor="middle">chokidar 文件监听</text>
  <text x="770" y="398" fill="#6b7280" font-size="11" text-anchor="middle">监听 .md/.mdx/.markdown</text>
  <text x="770" y="414" fill="#6b7280" font-size="11" text-anchor="middle">EMFILE 降级：仅监听已打开文件</text>
  <text x="770" y="430" fill="#6b7280" font-size="11" text-anchor="middle">忽略 Unix socket/FIFO</text>
  <path d="M 640,400 L 610,400" stroke="#ea580c" stroke-width="1.5" fill="none" marker-end="url(#arrow-orange)"/>
  <rect x="40" y="500" width="880" height="80" rx="12" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="60" y="522" fill="#166534" font-size="12" font-weight="600">FILE SYSTEM</text>
  <rect x="60" y="535" width="280" height="30" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
  <text x="200" y="555" fill="#111827" font-size="12" text-anchor="middle">Markdown 文件 (.md/.mdx)</text>
  <rect x="370" y="535" width="240" height="30" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
  <text x="490" y="555" fill="#111827" font-size="12" text-anchor="middle">图片/媒体资源</text>
  <rect x="640" y="535" width="260" height="30" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
  <text x="770" y="555" fill="#111827" font-size="12" text-anchor="middle">目录结构（文件树扫描）</text>
  <path d="M 480,298 L 480,320" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
  <rect x="444" y="298" width="72" height="16" rx="3" fill="#ffffff" opacity="0.95"/>
  <text x="480" y="310" fill="#2563eb" font-size="10" text-anchor="middle" font-weight="600">HTTP API</text>
  <path d="M 520,298 L 520,320" stroke="#ea580c" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arrow-orange)"/>
  <rect x="525" y="298" width="76" height="16" rx="3" fill="#ffffff" opacity="0.95"/>
  <text x="563" y="310" fill="#ea580c" font-size="10" text-anchor="middle" font-weight="600">WebSocket ↑</text>
  <path d="M 250,505 L 250,500" stroke="#16a34a" stroke-width="1.5" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M 490,470 L 490,500" stroke="#16a34a" stroke-width="1.5" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M 770,470 L 770,500" stroke="#16a34a" stroke-width="1.5" fill="none" marker-end="url(#arrow-green)"/>
  <rect x="700" y="570" width="220" height="50" rx="8" fill="#111827" stroke="#374151" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="810" y="593" fill="#ffffff" font-size="13" font-weight="600" text-anchor="middle">CLI 入口</text>
  <text x="810" y="608" fill="#9ca3af" font-size="11" text-anchor="middle">npx vibeview [--dir]</text>
  <path d="M 810,570 L 810,510" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="4,2" fill="none" marker-end="url(#arrow-gray)"/>
  <g transform="translate(40, 650)">
    <text x="0" y="12" fill="#6b7280" font-size="11" font-weight="600">图例：</text>
    <line x1="50" y1="8" x2="80" y2="8" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
    <text x="86" y="12" fill="#6b7280" font-size="11">HTTP 请求</text>
    <line x1="170" y1="8" x2="200" y2="8" stroke="#ea580c" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-orange)"/>
    <text x="206" y="12" fill="#6b7280" font-size="11">WebSocket 推送</text>
    <line x1="320" y1="8" x2="350" y2="8" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
    <text x="356" y="12" fill="#6b7280" font-size="11">文件读写</text>
    <line x1="430" y1="8" x2="460" y2="8" stroke="#9333ea" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
    <text x="466" y="12" fill="#6b7280" font-size="11">渲染管线</text>
    <line x1="560" y1="8" x2="590" y2="8" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow-red)"/>
    <text x="596" y="12" fill="#6b7280" font-size="11">安全过滤</text>
  </g>
</svg>